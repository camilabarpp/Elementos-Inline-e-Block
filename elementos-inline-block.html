<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">

            <style type="text/css">
                .borda{
                    border: 1px solid red;
                }
            </style>

    </head>

    <body>
    <!-- Block = ocupa o tamanho inteiro da linha.
         Inline = ocupa somente o tamanho do seu conteúdo.
         Se usar "display: inline-block" em itens que são inlines, 
         ele irá fazer a quebra e passar para a linha abaixo assim
         que a primeira caixa tiver um tamanho grande.
    -->
        <h1 class="borda">Bloco 1</h1>
        <h1 class="borda">Bloco 2</h1>
        
            
    </body>
</html>
